<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>🚀 TaskFlow Pro</h1>
            <p>Modern Serverless Task Manager</p>
        </header>

        <div class="task-form">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task..."
            >

            <button id="createBtn">
                Create Task
            </button>
        </div>

        <div id="message"></div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Tasks</h3>
                <span id="taskCount">0</span>
            </div>
        </div>

        <h2>Your Tasks</h2>

        <div id="taskList"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
